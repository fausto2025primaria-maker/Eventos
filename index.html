<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Llançador Medieval amb Flip</title>
<style>
body{
  margin:0;
  background:#1a120c;
  font-family:Georgia, serif;
  color:white;
  text-align:center;
}

h1{
  margin:20px;
  font-size:2.5rem;
}

.container{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.flip-card{
  background:transparent;
  width:90%;
  max-width:800px;
  height:1100px;
  perspective:1400px;
  margin:20px auto;
}

.flip-card-inner{
  position:relative;
  width:100%;
  height:100%;
  text-align:center;
  transition:transform 0.9s ease;
  transform-style:preserve-3d;
}

.flip-card.flipped .flip-card-inner{
  transform:rotateY(180deg);
}

.flip-card-front,
.flip-card-back{
  position:absolute;
  width:100%;
  height:100%;
  -webkit-backface-visibility:hidden;
  backface-visibility:hidden;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 15px 40px rgba(0,0,0,0.5);
}

.flip-card-front{
  background:#f4e7c2;
  color:#2b1b12;
  transform:rotateY(180deg);
  display:flex;
  align-items:center;
  justify-content:center;
}

.flip-card-front img{
  width:100%;
  height:100%;
  object-fit:contain;
  background:#f4e7c2;
}

.flip-card-back{
  background:linear-gradient(180deg,#6d1f17,#3c120e);
  color:#f5e6c8;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  border:4px solid #c9a24d;
}

.back-icon{
  font-size:5rem;
  margin-bottom:20px;
}

.back-title{
  font-size:2.2rem;
  font-weight:bold;
  margin-bottom:10px;
}

.back-sub{
  font-size:1.2rem;
  opacity:0.9;
}

.buttons{
  display:flex;
  gap:15px;
  flex-wrap:wrap;
  justify-content:center;
  margin:20px;
}

button{
  padding:15px 25px;
  font-size:1.2rem;
  background:#8e241b;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

button:hover{
  background:#b83227;
}

.status{
  margin-bottom:20px;
  font-size:1rem;
  color:#f0e4c5;
}

@media (max-width: 900px){
  .flip-card{
    height:900px;
  }
}

@media (max-width: 650px){
  h1{
    font-size:2rem;
  }

  .flip-card{
    height:700px;
  }

  .back-title{
    font-size:1.7rem;
  }

  .back-sub{
    font-size:1rem;
  }
}
</style>
</head>

<body>

<h1>🎴 Cartes d’esdeveniment</h1>

<div class="container">

  <div class="flip-card" id="flipCard">
    <div class="flip-card-inner">

      <div class="flip-card-front" id="cardFront">
        <img id="cardImage" src="" alt="Carta medieval">
      </div>

      <div class="flip-card-back">
        <div class="back-icon">🏰</div>
        <div class="back-title">Sant Marcelí</div>
        <div class="back-sub">Prem “Llançar carta”</div>
      </div>

    </div>
  </div>

  <div class="buttons">
    <button onclick="draw()">Llançar carta</button>
    <button onclick="showBack()">Tornar al dors</button>
  </div>

  <div class="status" id="status">Esperant la primera carta...</div>
</div>

<audio id="sound" src="flip.mp3"></audio>

<script>
const cards = [
  {img:"Hivern.png", nom:"Hivern dur"},
  {img:"Malaltia.png", nom:"Malaltia"},
  {img:"Impostos.png", nom:"Impostos reials"},
  {img:"Guerra.png", nom:"Guerra"},
  {img:"Collita.png", nom:"Collita excel·lent"},
  {img:"Clergat.png", nom:"Ajuda del clergat"},
  {img:"Rebelio.png", nom:"Rebel·lió camperola"},
  {img:"Festa.png", nom:"Festa al regne"},
  {img:"Caos.png", nom:"Any de caos"},
  {img:"Traicio.png", nom:"Traïció"},
  {img:"Mercat.png", nom:"Mercat"},
  {img:"noble.png", nom:"Permanença del noble"}
];

const flipCard = document.getElementById("flipCard");
const cardImage = document.getElementById("cardImage");
const statusText = document.getElementById("status");
const sound = document.getElementById("sound");

function draw(){
  const c = cards[Math.floor(Math.random() * cards.length)];

  flipCard.classList.remove("flipped");

  setTimeout(() => {
    cardImage.src = c.img;
    cardImage.alt = c.nom;
    statusText.textContent = "Carta actual: " + c.nom;

    try {
      sound.currentTime = 0;
      sound.play();
    } catch(e) {}

    flipCard.classList.add("flipped");
  }, 250);
}

function showBack(){
  flipCard.classList.remove("flipped");
  statusText.textContent = "Has tornat al dors de la carta.";
}
</script>

</body>
</html>
