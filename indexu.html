<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Llançador Medieval ULTRA PRO</title>
<style>
body{
  margin:0;
  background:#120a06;
  font-family:Georgia, serif;
  color:white;
  text-align:center;
}

h1{
  margin:20px;
  font-size:2.5rem;
}

.container{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.flip-card{
  background:transparent;
  width:90%;
  max-width:800px;
  height:1100px;
  perspective:1400px;
  margin:20px auto;
}

.flip-card-inner{
  position:relative;
  width:100%;
  height:100%;
  text-align:center;
  transition:transform 0.95s ease;
  transform-style:preserve-3d;
}

.flip-card.flipped .flip-card-inner{
  transform:rotateY(180deg);
}

.flip-card.shake .flip-card-inner{
  animation:shakeCard .25s linear 2;
}

@keyframes shakeCard{
  0%{transform:translateX(0);}
  25%{transform:translateX(-6px);}
  50%{transform:translateX(6px);}
  75%{transform:translateX(-4px);}
  100%{transform:translateX(0);}
}

.flip-card-front,
.flip-card-back{
  position:absolute;
  width:100%;
  height:100%;
  -webkit-backface-visibility:hidden;
  backface-visibility:hidden;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 15px 40px rgba(0,0,0,0.5);
}

.flip-card-front{
  background:#f4e7c2;
  color:#2b1b12;
  transform:rotateY(180deg);
  display:flex;
  align-items:center;
  justify-content:center;
}

.flip-card-front img{
  width:100%;
  height:100%;
  object-fit:contain;
  background:#f4e7c2;
}

.flip-card-back{
  background-image:url('dors.jpg');
  background-size:cover;
  background-position:center;
  border:4px solid #c9a24d;
  position:relative;
}

.flip-card-back::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.22) 45%, transparent 70%);
  transform:translateX(-120%);
  animation:shine 3.4s linear infinite;
  pointer-events:none;
}

@keyframes shine{
  0%{transform:translateX(-120%);}
  100%{transform:translateX(120%);}
}

.buttons{
  display:flex;
  gap:15px;
  flex-wrap:wrap;
  justify-content:center;
  margin:20px;
}

button{
  padding:15px 25px;
  font-size:1.2rem;
  background:#8e241b;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

button:hover{
  background:#b83227;
}

.status{
  margin-bottom:20px;
  font-size:1rem;
  color:#f0e4c5;
  min-height:1.4em;
}

@media (max-width: 900px){
  .flip-card{
    height:900px;
  }
}

@media (max-width: 650px){
  h1{
    font-size:2rem;
  }

  .flip-card{
    height:700px;
  }
}
</style>
</head>

<body>

<h1>🎴 Cartes d’esdeveniment</h1>

<div class="container">

  <div class="flip-card" id="flipCard">
    <div class="flip-card-inner">

      <div class="flip-card-front" id="cardFront">
        <img id="cardImage" src="" alt="Carta medieval">
      </div>

      <div class="flip-card-back"></div>

    </div>
  </div>

  <div class="buttons">
    <button onclick="draw()">Llançar carta</button>
    <button onclick="showBack()">Tornar al dors</button>
    <button onclick="toggleFullscreen()">Pantalla completa</button>
  </div>

  <div class="status" id="status">Esperant la primera carta...</div>
</div>

<audio id="sound" src="flip.mp3"></audio>

<script>
const cards = [
  {img:"hivern.jpg", nom:"Hivern dur"},
  {img:"malaltia.jpg", nom:"Malaltia"},
  {img:"impostos.jpg", nom:"Impostos reials"},
  {img:"guerra.jpg", nom:"Guerra"},
  {img:"collita.jpg", nom:"Collita excel·lent"},
  {img:"clergat.jpg", nom:"Ajuda del clergat"},
  {img:"rebelio.jpg", nom:"Rebel·lió camperola"},
  {img:"festa.jpg", nom:"Festa al regne"},
  {img:"caos.jpg", nom:"Any de caos"},
  {img:"traicio.jpg", nom:"Traïció"},
  {img:"mercat.jpg", nom:"Mercat"},
  {img:"noble.jpg", nom:"Permanença del noble"}
];

const flipCard = document.getElementById("flipCard");
const cardImage = document.getElementById("cardImage");
const statusText = document.getElementById("status");
const sound = document.getElementById("sound");

let lastIndex = -1;

function getRandomCardIndex(){
  if(cards.length <= 1) return 0;
  let idx;
  do {
    idx = Math.floor(Math.random() * cards.length);
  } while (idx === lastIndex);
  lastIndex = idx;
  return idx;
}

function draw(){
  const c = cards[getRandomCardIndex()];

  flipCard.classList.remove("flipped");
  flipCard.classList.add("shake");

  setTimeout(() => {
    flipCard.classList.remove("shake");
    cardImage.src = c.img;
    cardImage.alt = c.nom;
    statusText.textContent = "Carta actual: " + c.nom;

    try {
      sound.currentTime = 0;
      sound.play();
    } catch(e) {}

    flipCard.classList.add("flipped");
  }, 350);
}

function showBack(){
  flipCard.classList.remove("flipped");
  statusText.textContent = "Has tornat al dors de la carta.";
}

function toggleFullscreen(){
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}
</script>

</body>
</html>
