<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<title>Llançador Medieval PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  margin:0;
  background:#1a120c;
  font-family:Georgia,serif;
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
}
h1{
  margin:20px;
  font-size:3rem;
  text-align:center;
}
#card{
  width:80%;
  max-width:900px;
  background:#f4e7c2;
  color:#2b1b12;
  border-radius:20px;
  padding:20px;
  text-align:center;
  box-shadow:0 20px 40px rgba(0,0,0,0.4);
}
#cardImage{
  width:100%;
  max-height:420px;
  object-fit:contain;
  border-radius:12px;
  margin-bottom:18px;
  background:#d8c59a;
  display:block;
}
.title{
  font-size:2.5rem;
  margin-bottom:10px;
}
.effect{
  font-size:1.4rem;
  margin:15px 0;
}
.flavour{
  font-style:italic;
  font-size:1.2rem;
}
button{
  margin:20px;
  padding:15px 25px;
  font-size:1.2rem;
  border:none;
  border-radius:10px;
  background:#8e241b;
  color:white;
  cursor:pointer;
}
#status{
  margin:0 0 20px;
  font-size:1rem;
  color:#e8d9b5;
  text-align:center;
  width:80%;
  max-width:900px;
}
</style>
</head>
<body>

<h1>🎴 Llançador Medieval PRO</h1>

<div id="card">
  <img id="cardImage" src="Dorso.jpg" alt="Dors de carta">
  <div class="title">Preparat...</div>
  <div class="effect">Prem per començar</div>
  <div class="flavour"></div>
</div>

<div id="status">Esperant... comprova que <b>Dorso.jpg</b> i les imatges de les cartes estan en la mateixa carpeta que este HTML.</div>

<button onclick="draw()">Llançar carta</button>

<audio id="sound" src="https://assets.mixkit.co/sfx/preview/mixkit-fast-paper-flip-1530.mp3"></audio>

<script>
const cards = [
  {title:"Hivern dur",effect:"Tots perden 2 de menjar",flavour:"El fred no perdona",img:"Hivern.png"},
  {title:"Malaltia",effect:"Alguns perden recursos",flavour:"Arriba sense avisar",img:"Malaltia.png"},
  {title:"Impostos reials",effect:"Camperols paguen més",flavour:"El rei sempre cobra",img:"Impostos.png"},
  {title:"Guerra",effect:"Alguns perden recursos",flavour:"La guerra ho canvia tot",img:"Guerra.png"},
  {title:"Collita excel·lent",effect:"+2 menjar camperols",flavour:"La terra respon",img:"Collita.png"},
  {title:"Ajuda del clergat",effect:"Reparteixen menjar",flavour:"La fe ajuda",img:"Clergat.png"},
  {title:"Rebel·lió camperola",effect:"No paguen impostos",flavour:"Ja n’hi ha prou",img:"Rebelio.png"},
  {title:"Festa al regne",effect:"+1 felicitat tots",flavour:"Tots celebren",img:"Festa.png"},
  {title:"Any de caos",effect:"Tot passa",flavour:"El pitjor any",img:"Caos.jpeg"},
  {title:"Traïció",effect:"Roba un recurs",flavour:"Confia... si pots",img:"Traicio.png"}
];

const cardImage = document.getElementById('cardImage');
const titleEl = document.querySelector('.title');
const effectEl = document.querySelector('.effect');
const flavourEl = document.querySelector('.flavour');
const statusEl = document.getElementById('status');
const sound = document.getElementById('sound');

let lastIndex = -1;

cardImage.addEventListener('error', () => {
  statusEl.textContent = 'No s\'ha trobat la imatge: ' + cardImage.getAttribute('src');
});

cardImage.addEventListener('load', () => {
  statusEl.textContent = 'Imatge carregada: ' + cardImage.getAttribute('src');
});

function randomIndex(){
  if(cards.length <= 1) return 0;
  let i;
  do { i = Math.floor(Math.random() * cards.length); } while (i === lastIndex);
  lastIndex = i;
  return i;
}

function draw(){
  const card = cards[randomIndex()];
  titleEl.textContent = card.title;
  effectEl.textContent = card.effect;
  flavourEl.textContent = '"' + card.flavour + '"';
  cardImage.src = card.img;
  cardImage.alt = card.title;
  try {
    sound.currentTime = 0;
    sound.play();
  } catch(e) {}
}
</script>

</body>
</html>
